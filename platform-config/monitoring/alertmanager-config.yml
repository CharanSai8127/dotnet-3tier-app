apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: dotnet-alerts
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: default-receiver
    groupBy: ["alertname"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 1h

  receivers:
    - name: default-receiver
      webhookConfigs:
        - url: http://alertmanager-webhook.default.svc.cluster.local:5001/
