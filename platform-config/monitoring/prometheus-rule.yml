apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: dotnet-app-rules
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: dotnet-app-alerts
      rules:

        - alert: HighCPUUsage
          expr: sum(rate(container_cpu_usage_seconds_total{namespace="default", pod=~"dotnetmongocrudapp.*"}[2m])) > 0.5
          for: 2m
          labels:
            severity: warning
          annotations:
            summary: "High CPU usage on dotnet app"
            description: "CPU usage is above 50% for 2 minutes"

        - alert: PodRestartingTooOften
          expr: increase(kube_pod_container_status_restarts_total{namespace="default", pod=~"dotnetmongocrudapp.*"}[5m]) > 2
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod restarting frequently"
            description: "Pod restarted more than 2 times in 5 minutes"

        - alert: PodNotReady
          expr: kube_pod_status_ready{namespace="default", condition="true", pod=~"dotnetmongocrudapp.*"} == 0
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: "Pod not ready"
            description: "Pod is not ready for more than 2 minutes"
